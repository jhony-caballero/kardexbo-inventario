<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Almacén V&J · Movimientos</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">VJ</div>
    <div class="brand-text">
      <span class="t1 brand-name">Almacén V&J</span>
      <span class="t2">Movimientos</span>
    </div>
  </div>
  <div class="topbar-actions">
    <span class="user-chip"></span>
    <button class="icon-btn" onclick="logout()" title="Cerrar sesión">⏻</button>
  </div>
</div>

<div class="container">

  <div class="section-card">
    <h3>Registrar movimiento</h3>
    <div class="section-sub">Elige el tipo, el producto y la cantidad</div>

    <div class="move-type-grid" id="typeGrid">
      <button type="button" data-type="inicial" data-dir="entrada"><span class="ic">🏁</span>Inicial</button>
      <button type="button" data-type="compra" data-dir="entrada"><span class="ic">🛒</span>Compra</button>
      <button type="button" data-type="venta" data-dir="salida"><span class="ic">💰</span>Venta</button>
      <button type="button" data-type="devolucion" data-dir="entrada"><span class="ic">↩️</span>Devolución</button>
      <button type="button" data-type="baja" data-dir="salida"><span class="ic">🗑️</span>Dar de baja</button>
    </div>

    <div id="devolutionDirWrap" style="display:none;">
      <div class="move-direction" id="devolutionDir">
        <button type="button" data-d="entrada">↩️ Devuelve el cliente (vuelve al stock)</button>
        <button type="button" data-d="salida">📤 Se devuelve al proveedor (sale del stock)</button>
      </div>
    </div>

    <div id="bajaReasonWrap" style="display:none;" class="field">
      <label>Motivo de la baja</label>
      <div class="chip-select" id="bajaReasonChips">
        <button type="button" data-r="Dañado">Dañado</button>
        <button type="button" data-r="Usado / desgastado">Usado / desgastado</button>
        <button type="button" data-r="Vencido">Vencido</button>
        <button type="button" data-r="Otro">Otro</button>
      </div>
    </div>

    <div class="field">
      <label>Producto</label>
      <button type="button" class="btn-upload" style="width:100%;text-align:left;" onclick="openModal('modalPickProduct')" id="btnPickProduct">Seleccionar producto...</button>
      <div class="field-hint" id="stockHint"></div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Cantidad</label>
        <input type="number" id="movQuantity" min="1" value="1">
      </div>
    </div>

    <div class="field" id="priceField">
      <label id="priceLabel">Precio unitario</label>
      <div class="price-box">
        <div class="currency-toggle">
          <button type="button" class="active" id="mBtnPEN" onclick="setMovCurrency('PEN')">Soles (S/.)</button>
          <button type="button" id="mBtnUSD" onclick="setMovCurrency('USD')">Dólares ($)</button>
        </div>
        <input type="number" id="movPrice" min="0" step="0.01" placeholder="0.00" oninput="updateMovConversion()">
        <div class="tc-row">
          Tipo de cambio del día:
          <input type="number" id="movExchangeRate" value="3.75" step="0.01" oninput="updateMovConversion()">
        </div>
        <div class="field-hint price" id="movConversionHint">≈ $0.00 USD</div>
      </div>
    </div>

    <div class="field">
      <label id="noteLabel">Nota / observación</label>
      <textarea id="movNote" placeholder="Ej. Cliente, número de orden de servicio, observaciones..."></textarea>
    </div>

    <button class="btn btn-primary" onclick="saveMovement()">Registrar movimiento</button>
  </div>

  <div class="section-card">
    <h3>Historial de movimientos</h3>
    <div class="chip-row" id="historyFilterChips">
      <button class="chip active" data-f="todos">Todos</button>
      <button class="chip" data-f="entrada">Entradas</button>
      <button class="chip" data-f="salida">Salidas</button>
    </div>
    <div class="btn-row" style="margin-bottom:14px;">
      <button class="btn btn-outline" onclick="exportHistoryPDF()">📄 Exportar PDF</button>
    </div>
    <div id="historyList"></div>
    <div class="loader" id="historyLoader"><div class="spinner"></div> Cargando historial...</div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="dashboard.html" data-page="dashboard"><span class="ic">📊</span>Dashboard</a>
  <a href="inventario.html" data-page="inventario"><span class="ic">📦</span>Inventario</a>
  <a href="movimientos.html" data-page="movimientos"><span class="ic">🔄</span>Movimientos</a>
  <a href="ajustes.html" data-page="ajustes"><span class="ic">⚙️</span>Ajustes</a>
</nav>

<!-- ===== MODAL: elegir producto ===== -->
<div class="modal-overlay" id="modalPickProduct">
  <div class="modal">
    <div class="modal-head">
      <h3>Elegir producto</h3>
      <button class="modal-close" onclick="closeModal('modalPickProduct')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <input type="text" id="pickSearch" placeholder="Buscar por nombre o código...">
      </div>

      <div class="field-hint" style="text-transform:uppercase;font-weight:600;letter-spacing:.03em;margin:0 0 6px;">Categoría</div>
      <div class="chip-row" id="pickCatChips" style="margin-bottom:4px;"></div>

      <div class="field-hint" style="text-transform:uppercase;font-weight:600;letter-spacing:.03em;margin:14px 0 6px;">Máquina / equipo</div>
      <div class="chip-row" id="pickMachineChips" style="margin-bottom:10px;"></div>

      <div id="pickResultCount" class="field-hint" style="margin-bottom:8px;"></div>
      <div id="pickList"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
<script src="js/movimientos.js"></script>
</body>
</html>
