<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Almacén V&J · Acceso</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body style="padding-bottom:0;">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-mark">VJ</div>
    <h1 class="brand-name">Almacén V&J</h1>
    <div class="sub">Sistema de inventario y kárdex digital</div>

    <div class="login-error" id="errBox"></div>

    <!-- ===== LOGIN ===== -->
    <form id="formLogin">
      <div class="field">
        <label>Correo</label>
        <input type="email" id="loginEmail" required autocomplete="username" placeholder="tucorreo@vjelectronics.com">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" id="btnLogin">Ingresar</button>
    </form>

    <!-- ===== SOLICITAR ACCESO ===== -->
    <form id="formSignup" style="display:none;">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="suName" required placeholder="Ej. Jhony Caballero">
      </div>
      <div class="field">
        <label>Correo</label>
        <input type="email" id="suEmail" required placeholder="tucorreo@vjelectronics.com">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="suPass" required minlength="6" placeholder="Mínimo 6 caracteres">
      </div>
      <button type="submit" class="btn btn-primary" id="btnSignup">Solicitar acceso</button>
    </form>

    <div class="login-footer">
      <a href="#" id="toggleMode">¿Aún no tienes cuenta? Solicita acceso</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/common.js"></script>
<script>
const formLogin = document.getElementById('formLogin');
const formSignup = document.getElementById('formSignup');
const toggleMode = document.getElementById('toggleMode');
const errBox = document.getElementById('errBox');
let signupMode = false;

toggleMode.addEventListener('click', (e)=>{
  e.preventDefault();
  signupMode = !signupMode;
  formLogin.style.display = signupMode ? 'none' : 'block';
  formSignup.style.display = signupMode ? 'block' : 'none';
  toggleMode.textContent = signupMode ? '¿Ya tienes cuenta? Inicia sesión' : '¿Aún no tienes cuenta? Solicita acceso';
  errBox.style.display = 'none';
});

function showErr(msg){
  errBox.textContent = msg;
  errBox.style.display = 'block';
}

// Si ya hay sesión activa, saltar directo (auth.js se encarga del resto en cada página)
auth.onAuthStateChanged(user=>{
  if(user){ window.location.href = 'dashboard.html'; }
});

// Nombre del sistema (lectura pública, configurable solo por el admin en Ajustes)
db.collection('config').doc('sistema').get().then(snap=>{
  const nombre = (snap.exists && snap.data().nombre) ? snap.data().nombre : 'Almacén V&J';
  document.querySelectorAll('.brand-name').forEach(el=> el.textContent = nombre);
  document.title = document.title.replace('Almacén V&J', nombre);
}).catch(()=>{});

formLogin.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errBox.style.display = 'none';
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try{
    await auth.signInWithEmailAndPassword(
      document.getElementById('loginEmail').value.trim(),
      document.getElementById('loginPass').value
    );
    window.location.href = 'dashboard.html';
  }catch(err){
    showErr(traducirError(err.code));
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
});

formSignup.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errBox.style.display = 'none';
  const btn = document.getElementById('btnSignup');
  btn.disabled = true; btn.textContent = 'Enviando...';
  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const pass = document.getElementById('suPass').value;
  try{
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const isAdminUser = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    await db.collection('users').doc(cred.user.uid).set({
      name, email,
      role: isAdminUser ? 'admin' : 'user',
      status: isAdminUser ? 'active' : 'pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    window.location.href = isAdminUser ? 'dashboard.html' : 'pending.html';
  }catch(err){
    showErr(traducirError(err.code));
    btn.disabled = false; btn.textContent = 'Solicitar acceso';
  }
});

function traducirError(code){
  const map = {
    'auth/user-not-found': 'No existe una cuenta con ese correo.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/email-already-in-use': 'Ese correo ya tiene una cuenta. Intenta iniciar sesión.',
    'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
    'auth/invalid-email': 'El correo no es válido.',
    'auth/too-many-requests': 'Demasiados intentos. Espera unos minutos.'
  };
  return map[code] || 'Ocurrió un error. Intenta de nuevo.';
}
</script>
</body>
</html>
